<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page Not Found — Hawau & Lukman Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --forest:#0C1A0E;--forest2:#0F2012;--forest3:#152819;
  --teal:#0F7A6A;--teal3:#3DD4C8;
  --gold:#B8922C;--gold2:#D4A840;--gold3:#EFC060;
  --text:rgba(242,234,216,.9);--muted:rgba(242,234,216,.45);
  --border:rgba(180,140,44,.15);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:var(--forest);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:40px 20px;
  background:radial-gradient(ellipse at 50% 30%,var(--forest3),var(--forest))}
.wrap{max-width:520px}
.icon{font-size:5rem;margin-bottom:20px;opacity:.7}
.code{font-family:'Cinzel',serif;font-size:6rem;line-height:1;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px}
.title{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:5px;
  text-transform:uppercase;color:var(--teal3);margin-bottom:20px}
.msg{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.1rem;color:var(--muted);line-height:2;margin-bottom:32px}
.btn{display:inline-flex;align-items:center;gap:8px;
  font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:2px;
  text-transform:uppercase;padding:13px 28px;border:none;
  border-radius:4px;cursor:pointer;text-decoration:none;
  background:linear-gradient(135deg,var(--teal),#18A895);color:#fff;
  box-shadow:0 6px 24px rgba(15,122,106,.35);transition:all .28s ease}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(24,168,149,.4)}
.footer{margin-top:48px;font-family:'Great Vibes',cursive;font-size:1.6rem;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  opacity:.4}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">💍</div>
  <div class="code">404</div>
  <div class="title">Page Not Found</div>
  <p class="msg">It seems you've wandered off the path. The page you're looking for doesn't exist, but the celebration awaits you!</p>
  <a href="/" class="btn">Return to Celebration</a>
  <div class="footer">Hawau & Lukman</div>
</div>
</body>
</html>
