<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Verify Guest - Hawau & Lukman Wedding</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0A1A0C;--bg2:#0F2012;--bg3:#152819;--bg4:#1C3522;
      --gold:#C49E50;--gold2:#DDB860;--gold3:#F0D080;
      --teal:#0F7A6A;--teal2:#18A895;--teal3:#3DD4C8;
      --green:#3CB371;--red:#E05050;
      --text:rgba(242,234,216,.92);--muted:rgba(242,234,216,.42);
      --border:rgba(196,158,80,.15);--border2:rgba(196,158,80,.3);
      --r:8px;--dur:.22s;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;font-family:'Jost',sans-serif;background:var(--bg);color:var(--text)}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;font-family:inherit}
    input{font-family:inherit}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--bg2)}
    ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
    
    .container{max-width:500px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column}
    
    .header{text-align:center;padding:30px 0;border-bottom:1px solid var(--border);margin-bottom:30px}
    .logo{font-family:'Cinzel',serif;font-size:1.5rem;letter-spacing:4px;background:linear-gradient(135deg,var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
    .logo-sub{font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
    
    .card{background:rgba(0,0,0,.3);border:1px solid var(--border);padding:24px;border-radius:var(--r);margin-bottom:16px}
    .card-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold3);margin-bottom:16px}
    
    /* Mode Toggle */
    .mode-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:var(--r);padding:4px;margin-bottom:20px}
    .mode-btn{flex:1;padding:12px 16px;border:none;background:transparent;color:var(--muted);font-family:'Jost',sans-serif;font-size:.8rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;transition:all var(--dur);border-radius:calc(var(--r) - 4px);cursor:pointer}
    .mode-btn:hover{color:var(--text)}
    .mode-btn.active{background:var(--teal);color:#fff}
    
    /* Scanner Section */
    .scanner-section{display:none}
    .scanner-section.active{display:block}
    
    #reader{width:100%;border-radius:var(--r);overflow:hidden;margin-bottom:16px;background:#000}
    #reader video{border-radius:var(--r);width:100%!important}
    
    .scanner-status{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:rgba(61,212,200,.1);border:1px solid rgba(61,212,200,.2);border-radius:var(--r);margin-bottom:16px}
    .scanner-status .dot{width:8px;height:8px;background:var(--teal3);border-radius:50%;animation:pulse 1.5s ease infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .scanner-status span{font-size:.75rem;color:var(--teal3)}
    
    .scanner-error{background:rgba(224,80,80,.1);border:1px solid rgba(224,80,80,.3);color:var(--red);padding:16px;border-radius:var(--r);font-size:.8rem;text-align:center}
    .scanner-error p{margin:8px 0}
    .scanner-error .error-title{font-weight:600;font-size:.85rem;margin-bottom:12px}
    
    .scanner-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;background:rgba(0,0,0,.3);border-radius:var(--r);margin-bottom:16px}
    .scanner-loading::after{content:'';width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--teal3);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .scanner-loading-text{margin-top:16px;font-size:.8rem;color:var(--muted)}
    
    /* Manual Input Section */
    .manual-section{display:none}
    .manual-section.active{display:block}
    
    .input-group{margin-bottom:16px}
    .input-group label{display:block;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .barcode-input-wrapper{display:flex;align-items:stretch;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color var(--dur)}
    .barcode-input-wrapper:focus-within{border-color:var(--gold)}
    .barcode-prefix{background:rgba(196,158,80,.15);color:var(--gold3);padding:14px 12px;font-size:1rem;font-family:monospace;letter-spacing:2px;font-weight:600;white-space:nowrap;display:flex;align-items:center}
    .barcode-input-wrapper input{flex:1;background:transparent;border:none;color:var(--text);padding:14px 12px;font-size:1rem;outline:none;text-transform:uppercase;letter-spacing:2px;font-family:monospace}
    .barcode-input-wrapper input::placeholder{text-transform:uppercase;letter-spacing:2px;color:var(--muted)}
    .input-group input:focus{border-color:var(--gold)}
    .input-group input::placeholder{text-transform:none;letter-spacing:normal}
    
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;padding:14px 24px;border:none;border-radius:var(--r);transition:all var(--dur);cursor:pointer;width:100%}
    .btn-primary{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff}
    .btn-primary:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-2px)}
    .btn-secondary{background:rgba(255,255,255,.1);border:1px solid var(--border);color:var(--text)}
    .btn-secondary:hover{background:rgba(255,255,255,.15)}
    .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);font-weight:600}
    .btn-gold:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-2px)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    
    .btn-row{display:flex;gap:8px}
    .btn-row .btn{flex:1}
    
    .result{display:none}
    .result.show{display:block;animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    
    .valid-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;font-size:.7rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
    .valid-badge.valid{background:rgba(60,179,113,.15);color:var(--green);border:1px solid rgba(60,179,113,.3)}
    .valid-badge.invalid{background:rgba(224,80,80,.15);color:var(--red);border:1px solid rgba(224,80,80,.3)}
    
    .guest-info{background:rgba(0,0,0,.2);padding:16px;border-radius:var(--r);margin-top:16px}
    .guest-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
    .guest-row:last-child{border-bottom:none}
    .guest-label{font-size:.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
    .guest-value{font-size:.9rem;color:var(--text);text-align:right}
    
    .attendance-badge{font-size:.6rem;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:12px}
    .attendance-badge.physical{background:rgba(196,158,80,.15);color:var(--gold3);border:1px solid rgba(196,158,80,.3)}
    .attendance-badge.virtual{background:rgba(61,212,200,.15);color:var(--teal3);border:1px solid rgba(61,212,200,.3)}
    .attendance-badge.regrets{background:rgba(150,150,150,.15);color:var(--muted);border:1px solid rgba(150,150,150,.3)}
    
    .guest-of-badge{font-size:.6rem;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:12px}
    .guest-of-badge.bride{background:rgba(255,105,180,.15);color:#ffb6c1;border:1px solid rgba(255,105,180,.3)}
    .guest-of-badge.groom{background:rgba(100,149,237,.15);color:#87ceeb;border:1px solid rgba(100,149,237,.3)}
    .guest-of-badge.both{background:rgba(180,140,60,.15);color:var(--gold3);border:1px solid rgba(180,140,60,.3)}
    
    .history{margin-top:20px}
    .history-title{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
    .history-item{background:rgba(0,0,0,.2);padding:12px;border-radius:var(--r);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background var(--dur)}
    .history-item:hover{background:rgba(0,0,0,.3)}
    .history-name{font-size:.85rem}
    .history-time{font-size:.65rem;color:var(--muted)}
    
    .footer{text-align:center;padding:20px 0;margin-top:auto;border-top:1px solid var(--border)}
    .footer-text{font-size:.65rem;color:var(--muted)}
    
    .error-msg{background:rgba(224,80,80,.1);border:1px solid rgba(224,80,80,.3);color:var(--red);padding:12px;border-radius:var(--r);font-size:.8rem;text-align:center}
    
    /* Guest Details Popup Modal */
    .guest-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .3s ease;padding:16px}
    .guest-modal.show{display:flex}
    .guest-modal-content{background:var(--bg);border:2px solid var(--green);border-radius:16px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;animation:popIn .3s ease}
    @keyframes popIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
    
    .modal-header{padding:20px;background:linear-gradient(135deg,rgba(60,179,113,.2),rgba(60,179,113,.1));border-bottom:1px solid rgba(60,179,113,.3);text-align:center}
    .modal-valid-icon{width:60px;height:60px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:2rem;color:#fff;box-shadow:0 4px 20px rgba(60,179,113,.4)}
    .modal-valid-text{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:3px;text-transform:uppercase;color:var(--green);margin-bottom:4px}
    .modal-guest-name{font-family:'Great Vibes',cursive;font-size:2rem;color:var(--gold3);line-height:1.2}
    
    .modal-body{padding:20px}
    .modal-info-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
    .modal-info-row:last-child{border-bottom:none}
    .modal-label{font-size:.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
    .modal-value{font-size:.9rem;color:var(--text);text-align:right;font-weight:500}
    .modal-barcode{font-family:monospace;background:rgba(196,158,80,.1);padding:4px 8px;border-radius:4px;color:var(--gold3)}
    
    .modal-badge{font-size:.6rem;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;border-radius:20px;font-weight:600}
    .modal-badge.physical{background:rgba(196,158,80,.15);color:var(--gold3);border:1px solid rgba(196,158,80,.3)}
    .modal-badge.virtual{background:rgba(61,212,200,.15);color:var(--teal3);border:1px solid rgba(61,212,200,.3)}
    .modal-badge.regrets{background:rgba(150,150,150,.15);color:var(--muted);border:1px solid rgba(150,150,150,.3)}
    .modal-badge.bride{background:rgba(255,105,180,.15);color:#ffb6c1;border:1px solid rgba(255,105,180,.3)}
    .modal-badge.groom{background:rgba(100,149,237,.15);color:#87ceeb;border:1px solid rgba(100,149,237,.3)}
    .modal-badge.both{background:rgba(180,140,60,.15);color:var(--gold3);border:1px solid rgba(180,140,60,.3)}
    
    .modal-footer{padding:16px 20px 20px;display:flex;gap:10px}
    .modal-btn{flex:1;padding:14px;border:none;border-radius:var(--r);font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
    .modal-btn-primary{background:var(--green);color:#fff}
    .modal-btn-primary:hover{filter:brightness(1.1)}
    .modal-btn-secondary{background:rgba(255,255,255,.1);color:var(--text);border:1px solid var(--border)}
    .modal-btn-secondary:hover{background:rgba(255,255,255,.15)}
    
    /* Invalid Modal */
    .guest-modal.invalid .guest-modal-content{border-color:var(--red)}
    .guest-modal.invalid .modal-header{background:linear-gradient(135deg,rgba(224,80,80,.2),rgba(224,80,80,.1));border-bottom-color:rgba(224,80,80,.3)}
    .guest-modal.invalid .modal-valid-icon{background:var(--red)}
    .guest-modal.invalid .modal-valid-text{color:var(--red)}
    
    /* Warning Modal (Already Scanned) */
    .guest-modal.warning .guest-modal-content{border-color:#F59E0B}
    .guest-modal.warning .modal-header{background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(245,158,11,.1));border-bottom-color:rgba(245,158,11,.3)}
    .guest-modal.warning .modal-valid-icon{background:#F59E0B}
    .guest-modal.warning .modal-valid-text{color:#F59E0B}
    
    .scanned-warning{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:var(--r);padding:12px;margin-bottom:12px}
    .scanned-warning .modal-label{color:#F59E0B}
    
    .valid-badge.warning{background:rgba(245,158,11,.15);color:#F59E0B;border:1px solid rgba(245,158,11,.3)}
    
    /* Scan Success Overlay */
    .scan-success{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(60,179,113,.95);display:none;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .2s ease}
    .scan-success.show{display:flex}
    .scan-success-content{text-align:center;color:#fff}
    .scan-success-icon{font-size:4rem;margin-bottom:16px}
    .scan-success-text{font-size:1.2rem;font-weight:600}
    
    @media(max-width:400px){
      .mode-btn{padding:10px 12px;font-size:.7rem}
      .guest-row{flex-direction:column;gap:4px}
      .guest-value{text-align:left}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">H & L</div>
      <div class="logo-sub">Guest Verification</div>
    </div>
    
    <div class="card">
      <div class="card-title">Scan or Enter Barcode</div>
      
      <!-- Mode Toggle -->
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="switchMode('camera')" id="cameraBtn">
          📷 Camera
        </button>
        <button class="mode-btn" onclick="switchMode('manual')" id="manualBtn">
          ⌨️ Manual
        </button>
      </div>
      
      <!-- Camera Scanner Section -->
      <div class="scanner-section active" id="scannerSection">
        <div id="scannerStatus" class="scanner-status">
          <span class="dot"></span>
          <span>Initializing camera...</span>
        </div>
        <div id="reader"></div>
        <div id="scannerError" style="display:none"></div>
      </div>
      
      <!-- Manual Input Section -->
      <div class="manual-section" id="manualSection">
        <div class="input-group">
          <label for="barcodeInput">Barcode Number</label>
          <div class="barcode-input-wrapper">
            <span class="barcode-prefix">HL2026-</span>
            <input type="text" id="barcodeInput" placeholder="XXXXXXXX" maxlength="12" onkeydown="if(event.key==='Enter')verifyBarcode()" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
          </div>
        </div>
        <button class="btn btn-primary" id="verifyBtn" onclick="verifyBarcode()">
          <span id="btnText">Verify Guest</span>
        </button>
      </div>
    </div>
    
    <div class="result" id="resultCard">
      <!-- Results will be inserted here -->
    </div>
    
    <!-- Guest Details Modal -->
    <div class="guest-modal" id="guestModal">
      <div class="guest-modal-content">
        <div class="modal-header">
          <div class="modal-valid-icon" id="modalIcon">✓</div>
          <div class="modal-valid-text" id="modalStatusText">Valid Guest</div>
          <div class="modal-guest-name" id="modalGuestName">Guest Name</div>
        </div>
        <div class="modal-body" id="modalBody">
          <!-- Guest details will be inserted here -->
        </div>
        <div class="modal-footer">
          <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Close</button>
          <button class="modal-btn modal-btn-primary" id="modalActionBtn" onclick="scanAnother()">Scan Another</button>
        </div>
      </div>
    </div>
    
    <!-- Scan Success Overlay -->
    <div class="scan-success" id="scanSuccess">
      <div class="scan-success-content">
        <div class="scan-success-icon">✓</div>
        <div class="scan-success-text">Barcode Scanned!</div>
      </div>
    </div>
    
    <div class="history" id="historySection" style="display:none">
      <div class="history-title">Recent Scans</div>
      <div id="historyList"></div>
    </div>
    
    <!-- Guest Checklist Button -->
    <div class="card" style="margin-top:16px">
      <button class="btn btn-gold" onclick="showChecklist()">
        📋 View Guest Checklist
      </button>
    </div>
    
    <!-- Guest Checklist Modal -->
    <div class="guest-modal" id="checklistModal">
      <div class="guest-modal-content" style="max-width:500px;border-color:var(--gold)">
        <div class="modal-header" style="background:linear-gradient(135deg,rgba(196,158,80,.2),rgba(196,158,80,.1));border-bottom-color:rgba(196,158,80,.3)">
          <div class="modal-valid-icon" style="background:var(--gold)">📋</div>
          <div class="modal-valid-text" style="color:var(--gold3)">Guest Checklist</div>
          <div class="modal-guest-name" id="checklistStats" style="font-size:1rem">Loading...</div>
        </div>
        <div class="modal-body" id="checklistBody" style="max-height:400px;overflow-y:auto;padding:12px">
          <!-- Checklist items will be inserted here -->
        </div>
        <div class="modal-footer">
          <button class="modal-btn modal-btn-secondary" onclick="refreshChecklist()">Refresh</button>
          <button class="modal-btn modal-btn-primary" style="background:var(--gold)" onclick="closeChecklistModal()">Close</button>
        </div>
      </div>
    </div>
    
    <div class="footer">
      <p class="footer-text">Hawau & Lukman Wedding • 19 April 2026</p>
    </div>
  </div>
  
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    var scanHistory = JSON.parse(localStorage.getItem('scanHistory') || '[]');
    var html5QrCode = null;
    var currentMode = 'camera';
    var isScanning = false;
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      renderHistory();
      initScanner();
    });
    
    function switchMode(mode) {
      currentMode = mode;
      var cameraBtn = document.getElementById('cameraBtn');
      var manualBtn = document.getElementById('manualBtn');
      var scannerSection = document.getElementById('scannerSection');
      var manualSection = document.getElementById('manualSection');
      
      if (mode === 'camera') {
        cameraBtn.classList.add('active');
        manualBtn.classList.remove('active');
        scannerSection.classList.add('active');
        manualSection.classList.remove('active');
        initScanner();
      } else {
        cameraBtn.classList.remove('active');
        manualBtn.classList.add('active');
        scannerSection.classList.remove('active');
        manualSection.classList.add('active');
        stopScanner();
        var input = document.getElementById('barcodeInput');
        input.focus();
        input.select();
      }
    }
    
    function initScanner() {
      if (html5QrCode && isScanning) return;
      
      var scannerError = document.getElementById('scannerError');
      var scannerStatus = document.getElementById('scannerStatus');
      var readerDiv = document.getElementById('reader');
      
      scannerError.style.display = 'none';
      scannerStatus.style.display = 'flex';
      scannerStatus.innerHTML = '<span class="dot"></span><span>Initializing camera...</span>';
      readerDiv.innerHTML = '';
      
      // Check if library is loaded
      if (typeof Html5Qrcode === 'undefined') {
        showScannerError(
          'Scanner Library Not Loaded',
          'The barcode scanner library failed to load. Please use Manual input instead.',
          true
        );
        return;
      }
      
      // Check if camera is supported
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showScannerError(
          'Camera Not Supported',
          'Your browser does not support camera access. Please use Manual input or try a different browser.',
          true
        );
        return;
      }
      
      html5QrCode = new Html5Qrcode("reader");
      
      var config = {
        fps: 10,
        qrbox: { width: 280, height: 150 },
        aspectRatio: 1.0,
        formatsToSupport: [
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.QR_CODE,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E
        ]
      };
      
      html5QrCode.start(
        { facingMode: "environment" },
        config,
        onScanSuccess,
        onScanFailure
      ).then(function() {
        isScanning = true;
        scannerStatus.innerHTML = '<span class="dot"></span><span>Point camera at barcode</span>';
      }).catch(function(err) {
        console.error('Scanner error:', err);
        var errorMsg = err.name === 'NotAllowedError' 
          ? 'Camera access was denied. Please allow camera access in your browser settings and refresh the page.'
          : err.name === 'NotFoundError'
          ? 'No camera found on this device. Please use Manual input.'
          : err.name === 'NotReadableError'
          ? 'Camera is in use by another application. Please close other apps using the camera.'
          : 'Unable to start camera: ' + (err.message || 'Unknown error');
        
        showScannerError(
          'Camera Error',
          errorMsg,
          true
        );
      });
    }
    
    function showScannerError(title, message, showManualButton) {
      var scannerError = document.getElementById('scannerError');
      var scannerStatus = document.getElementById('scannerStatus');
      
      scannerStatus.style.display = 'none';
      scannerError.style.display = 'block';
      
      var html = '<p class="error-title">⚠️ ' + title + '</p><p>' + message + '</p>';
      if (showManualButton) {
        html += '<button class="btn btn-secondary" style="margin-top:16px;padding:10px 16px" onclick="switchMode(\'manual\')">Switch to Manual Input</button>';
      }
      scannerError.innerHTML = html;
    }
    
    function stopScanner() {
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(function() {
          isScanning = false;
        }).catch(function(err) {
          console.log('Error stopping scanner:', err);
        });
      }
    }
    
    function onScanSuccess(decodedText, decodedResult) {
      console.log('Barcode scanned:', decodedText);
      
      // Stop scanner immediately
      if (html5QrCode && isScanning) {
        html5QrCode.pause();
      }
      
      // Process the barcode directly - don't show overlay yet
      verifyBarcode(decodedText, true);
    }
    
    function onScanFailure(error) {
      // Ignore scan failures - they happen frequently while scanning
    }
    
    function renderHistory() {
      var section = document.getElementById('historySection');
      var list = document.getElementById('historyList');
      
      if (scanHistory.length === 0) {
        section.style.display = 'none';
        return;
      }
      
      section.style.display = 'block';
      list.innerHTML = '';
      
      var recent = scanHistory.slice(-10).reverse();
      for (var i = 0; i < recent.length; i++) {
        var item = recent[i];
        var div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = '<span class="history-name">' + escapeHtml(item.name) + '</span><span class="history-time">' + item.time + '</span>';
        (function(barcode) {
          div.onclick = function() {
            document.getElementById('barcodeInput').value = barcode;
            switchMode('manual');
            verifyBarcode();
          };
        })(item.barcode);
        list.appendChild(div);
      }
    }
    
    function addToHistory(guest, barcode) {
      var entry = {
        name: guest.name,
        barcode: barcode,
        time: new Date().toLocaleTimeString()
      };
      scanHistory.push(entry);
      if (scanHistory.length > 50) scanHistory = scanHistory.slice(-50);
      localStorage.setItem('scanHistory', JSON.stringify(scanHistory));
      renderHistory();
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    
    function verifyBarcode(scannedBarcode, fromScanner) {
      var barcode;
      if (scannedBarcode) {
        barcode = scannedBarcode.trim().toUpperCase();
      } else {
        // Manual input - combine prefix with user input
        var userInput = document.getElementById('barcodeInput').value.trim().toUpperCase();
        // Remove any HL2026- prefix if user accidentally typed it
        userInput = userInput.replace(/^HL2026-?/i, '');
        barcode = 'HL2026-' + userInput;
      }
      
      console.log('Verifying barcode:', barcode);
      
      var btn = document.getElementById('verifyBtn');
      var btnText = document.getElementById('btnText');
      var resultCard = document.getElementById('resultCard');
      
      // Check if user entered anything after the prefix
      var barcodeSuffix = barcode.replace('HL2026-', '');
      if (!scannedBarcode && !barcodeSuffix) {
        showErrorModal('Missing Barcode', 'Please enter the barcode suffix (characters after HL2026-)');
        return;
      }
      
      // Check if barcode starts with HL2026-
      if (!barcode.startsWith('HL2026-')) {
        showErrorModal('Invalid Format', 'Barcode must start with HL2026-');
        resumeScanner();
        return;
      }
      
      btn.disabled = true;
      btnText.textContent = 'Verifying...';
      
      fetch('/api/verify/' + encodeURIComponent(barcode))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          console.log('API response:', data);
          btn.disabled = false;
          btnText.textContent = 'Verify Guest';
          
          if (data.valid) {
            // Show guest details popup modal
            showGuestModal(data.guest, barcode, fromScanner, data.alreadyScanned, data.scannedAt);
            addToHistory(data.guest, barcode);
            document.getElementById('barcodeInput').value = '';
          } else {
            // Show error modal
            showErrorModal('Invalid Barcode', data.error);
            resumeScanner();
          }
        })
        .catch(function(err) {
          console.error('API error:', err);
          btn.disabled = false;
          btnText.textContent = 'Verify Guest';
          showErrorModal('Connection Error', 'Unable to verify barcode. Please try again.');
          resumeScanner();
        });
    }
    
    function showGuestModal(guest, barcode, fromScanner, alreadyScanned, scannedAt) {
      var modal = document.getElementById('guestModal');
      var modalIcon = document.getElementById('modalIcon');
      var modalStatusText = document.getElementById('modalStatusText');
      var modalGuestName = document.getElementById('modalGuestName');
      var modalBody = document.getElementById('modalBody');
      var actionBtn = document.getElementById('modalActionBtn');
      
      // Set header - show warning if already scanned
      modal.classList.remove('invalid');
      modal.classList.remove('warning');
      
      if (alreadyScanned) {
        modal.classList.add('warning');
        modalIcon.textContent = '⚠';
        modalStatusText.textContent = 'Already Checked In';
        modalGuestName.textContent = guest.name;
      } else {
        modalIcon.textContent = '✓';
        modalStatusText.textContent = 'Checked In';
        modalGuestName.textContent = guest.name;
      }
      
      // Build attendance badge
      var attendanceClass = guest.attendance === 'physical' ? 'physical' : guest.attendance === 'virtual' ? 'virtual' : 'regrets';
      var attendanceText = guest.attendance === 'physical' ? 'In Person' : guest.attendance === 'virtual' ? 'Virtual' : 'Regrets';
      
      // Build guest of badge
      var guestOfHtml = '';
      if (guest.guest_of) {
        var guestOfClass = guest.guest_of;
        var guestOfText = guest.guest_of === 'bride' ? "Guest of Bride" : guest.guest_of === 'groom' ? "Guest of Groom" : 'Guest of Both';
        guestOfHtml = '<div class="modal-info-row"><span class="modal-label">Guest Of</span><span class="modal-value"><span class="modal-badge ' + guestOfClass + '">' + guestOfText + '</span></span></div>';
      }
      
      // Build dietary info
      var dietaryHtml = guest.dietary ? '<div class="modal-info-row"><span class="modal-label">Dietary</span><span class="modal-value">' + escapeHtml(guest.dietary) + '</span></div>' : '';
      
      // Build scanned info if already scanned
      var scannedHtml = '';
      if (alreadyScanned && scannedAt) {
        var scannedDate = new Date(scannedAt);
        scannedHtml = '<div class="modal-info-row scanned-warning"><span class="modal-label">⚠ Previous Scan</span><span class="modal-value">' + scannedDate.toLocaleString() + '</span></div>';
      }
      
      // Build modal body
      modalBody.innerHTML = 
        scannedHtml +
        '<div class="modal-info-row"><span class="modal-label">Barcode</span><span class="modal-value modal-barcode">' + barcode + '</span></div>' +
        '<div class="modal-info-row"><span class="modal-label">Attendance</span><span class="modal-value"><span class="modal-badge ' + attendanceClass + '">' + attendanceText + '</span></span></div>' +
        guestOfHtml +
        '<div class="modal-info-row"><span class="modal-label">Party Size</span><span class="modal-value">' + guest.party_size + ' guest' + (guest.party_size > 1 ? 's' : '') + '</span></div>' +
        dietaryHtml +
        '<div class="modal-info-row"><span class="modal-label">Email</span><span class="modal-value">' + (guest.email || '—') + '</span></div>' +
        '<div class="modal-info-row"><span class="modal-label">Phone</span><span class="modal-value">' + (guest.phone || '—') + '</span></div>' +
        '<div class="modal-info-row"><span class="modal-label">Registered</span><span class="modal-value">' + new Date(guest.registered_at).toLocaleDateString() + '</span></div>';
      
      // Update action button text
      actionBtn.textContent = fromScanner ? 'Scan Another' : 'Verify Another';
      
      // Show modal
      modal.classList.add('show');
      
      // Also update result card (hidden behind modal)
      var resultCard = document.getElementById('resultCard');
      resultCard.className = 'result show';
      if (alreadyScanned) {
        resultCard.innerHTML = '<div class="valid-badge warning">⚠ Already Scanned - ' + escapeHtml(guest.name) + '</div>';
      } else {
        resultCard.innerHTML = '<div class="valid-badge valid">✓ Checked In - ' + escapeHtml(guest.name) + '</div>';
      }
    }
    
    function showErrorModal(title, message) {
      var modal = document.getElementById('guestModal');
      var modalIcon = document.getElementById('modalIcon');
      var modalStatusText = document.getElementById('modalStatusText');
      var modalGuestName = document.getElementById('modalGuestName');
      var modalBody = document.getElementById('modalBody');
      var actionBtn = document.getElementById('modalActionBtn');
      
      // Set header for error
      modal.classList.add('invalid');
      modalIcon.textContent = '✗';
      modalStatusText.textContent = title;
      modalGuestName.textContent = '';
      
      // Build modal body
      modalBody.innerHTML = '<div style="text-align:center;padding:20px 0;color:var(--muted)">' + escapeHtml(message) + '</div>';
      
      // Update action button
      actionBtn.textContent = 'Try Again';
      actionBtn.onclick = function() { closeModal(); resetScanner(); };
      
      // Show modal
      modal.classList.add('show');
    }
    
    function closeModal() {
      var modal = document.getElementById('guestModal');
      modal.classList.remove('show');
      modal.classList.remove('invalid');
      
      // Reset action button
      var actionBtn = document.getElementById('modalActionBtn');
      actionBtn.onclick = scanAnother;
    }
    
    function scanAnother() {
      closeModal();
      resetScanner();
    }
    
    function resumeScanner() {
      if (currentMode === 'camera' && html5QrCode && isScanning) {
        setTimeout(function() {
          html5QrCode.resume();
        }, 1000);
      }
    }
    
    function resetScanner() {
      document.getElementById('resultCard').className = 'result';
      document.getElementById('barcodeInput').value = '';
      
      if (currentMode === 'camera') {
        resumeScanner();
      } else {
        document.getElementById('barcodeInput').focus();
      }
    }
    
    // ═══════════════════════════════════════════════════
    //  GUEST CHECKLIST FUNCTIONS
    // ═══════════════════════════════════════════════════
    
    var checklistData = null;
    
    function showChecklist() {
      var modal = document.getElementById('checklistModal');
      modal.classList.add('show');
      loadChecklist();
    }
    
    function closeChecklistModal() {
      var modal = document.getElementById('checklistModal');
      modal.classList.remove('show');
    }
    
    function refreshChecklist() {
      loadChecklist();
    }
    
    function loadChecklist() {
      var checklistBody = document.getElementById('checklistBody');
      var checklistStats = document.getElementById('checklistStats');
      
      checklistBody.innerHTML = '<div style="text-align:center;padding:40px"><div style="width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto"></div><p style="margin-top:12px;color:var(--muted);font-size:.8rem">Loading checklist...</p></div>';
      
      fetch('/api/guest-checklist')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          checklistData = data;
          var stats = data.stats;
          var checklist = data.checklist;
          
          // Update stats
          checklistStats.innerHTML = 
            '<span style="color:var(--green)">' + stats.checkedIn + '</span> / ' + stats.total + ' checked in' +
            ' <span style="color:var(--muted);font-size:.7rem">(Physical: ' + stats.physical + ')</span>';
          
          // Sort: checked in first, then by name
          checklist.sort(function(a, b) {
            if (a.checkedIn !== b.checkedIn) return a.checkedIn ? -1 : 1;
            return a.name.localeCompare(b.name);
          });
          
          // Build list
          var html = '';
          for (var i = 0; i < checklist.length; i++) {
            var guest = checklist[i];
            var checkedIcon = guest.checkedIn ? '✓' : '○';
            var checkedClass = guest.checkedIn ? 'checked' : '';
            var attendanceIcon = guest.attendance === 'physical' ? '📍' : guest.attendance === 'virtual' ? '💻' : '❌';
            var guestOfIcon = guest.guest_of === 'bride' ? '👰' : guest.guest_of === 'groom' ? '🤵' : '💑';
            
            html += '<div class="checklist-item ' + checkedClass + '" onclick="viewGuestFromChecklist(\'' + (guest.barcode || '') + '\')">';
            html += '<span class="checklist-check">' + checkedIcon + '</span>';
            html += '<span class="checklist-name">' + escapeHtml(guest.name) + '</span>';
            html += '<span class="checklist-icons">' + attendanceIcon + ' ' + guestOfIcon + '</span>';
            html += '</div>';
          }
          
          if (checklist.length === 0) {
            html = '<div style="text-align:center;padding:40px;color:var(--muted)"><p>No guests registered yet</p></div>';
          }
          
          checklistBody.innerHTML = html;
        })
        .catch(function(err) {
          console.error('Failed to load checklist:', err);
          checklistBody.innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)"><p>Failed to load checklist</p><button class="btn btn-secondary" style="margin-top:12px;padding:8px 16px" onclick="loadChecklist()">Retry</button></div>';
        });
    }
    
    function viewGuestFromChecklist(barcode) {
      if (!barcode) return;
      closeChecklistModal();
      document.getElementById('barcodeInput').value = barcode.replace('HL2026-', '');
      switchMode('manual');
      verifyBarcode();
    }
  </script>
  
  <style>
    /* Checklist item styles */
    .checklist-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      background: rgba(0,0,0,.2);
      cursor: pointer;
      transition: all .2s;
    }
    .checklist-item:hover {
      background: rgba(0,0,0,.35);
    }
    .checklist-item.checked {
      background: rgba(60,179,113,.1);
      border: 1px solid rgba(60,179,113,.2);
    }
    .checklist-item.checked .checklist-check {
      color: var(--green);
    }
    .checklist-item.checked .checklist-name {
      opacity: 0.7;
    }
    .checklist-check {
      width: 24px;
      font-size: 1.1rem;
      color: var(--muted);
    }
    .checklist-name {
      flex: 1;
      font-size: .85rem;
    }
    .checklist-icons {
      font-size: .75rem;
      opacity: 0.7;
    }
  </style>
</body>
</html>
